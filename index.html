<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="英語日記">
<meta name="theme-color" content="#1a1a2e">
<title>英語日記</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #222238;
    --border: #2e2e4a;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --text: #e8e8f0;
    --text2: #9090b0;
    --text3: #5a5a7a;
    --success: #34d399;
    --warning: #fbbf24;
    --danger: #f87171;
    --radius: 12px;
    --font: -apple-system, 'Helvetica Neue', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); }
  body { display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }

  header {
    padding: 16px 20px 12px;
    border-bottom: 0.5px solid var(--border);
    background: var(--surface);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  header h1 { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  #login-btn {
    background: var(--accent); color: #fff; border: none; border-radius: 8px;
    padding: 6px 14px; font-size: 13px; font-weight: 500; cursor: pointer;
  }
  #login-btn.logout { background: transparent; border: 0.5px solid var(--border); color: var(--text2); }
  #user-info { font-size: 12px; color: var(--text2); display: flex; align-items: center; gap: 8px; }

  .tab-bar {
    display: flex; border-bottom: 0.5px solid var(--border);
    background: var(--surface);
    position: sticky; top: 53px; z-index: 9;
  }
  .tab { flex: 1; padding: 11px 0; text-align: center; font-size: 13px; font-weight: 500;
    color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
  .tab.active { color: var(--accent2); border-bottom-color: var(--accent2); }

  .page { display: none; flex: 1; flex-direction: column; overflow: hidden; }
  .page.active { display: flex; }

  #write-page { padding: 20px; gap: 16px; overflow-y: auto; }
  .date-label { font-size: 12px; color: var(--text3); font-weight: 500; }
  .prompt-box {
    background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
  }
  .prompt-box .label { font-size: 11px; color: var(--accent2); font-weight: 600; margin-bottom: 6px; letter-spacing: 0.06em; }
  .prompt-box p { font-size: 13px; color: var(--text2); line-height: 1.6; }
  textarea {
    width: 100%; min-height: 160px; background: var(--surface2);
    border: 0.5px solid var(--border); border-radius: var(--radius);
    padding: 14px; color: var(--text); font-size: 16px; font-family: var(--font);
    line-height: 1.7; resize: none; outline: none; transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--text3); }
  .char-row { display: flex; justify-content: space-between; align-items: center; }
  .char-count { font-size: 12px; color: var(--text3); }
  .submit-btn {
    background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
    padding: 13px 24px; font-size: 15px; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .submit-btn:active { transform: scale(0.97); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .loading { display: flex; gap: 5px; align-items: center; justify-content: center; padding: 32px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 1.1s infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,80%,100%{opacity:0.3;transform:scale(0.8)} 40%{opacity:1;transform:scale(1)} }

  .feedback { display: flex; flex-direction: column; gap: 14px; margin-top: 4px; }
  .fb-section { background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .fb-section-header { padding: 10px 14px; display: flex; align-items: center; gap: 8px; border-bottom: 0.5px solid var(--border); }
  .fb-icon { font-size: 15px; }
  .fb-title { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.04em; }
  .fb-body { padding: 12px 14px; }
  .overall-text { font-size: 14px; color: var(--text); line-height: 1.75; }
  .issue-item { padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .issue-item:last-child { border-bottom: none; }
  .issue-orig { font-size: 13px; color: var(--danger); text-decoration: line-through; margin-bottom: 4px; }
  .issue-fixed { font-size: 13px; color: var(--success); margin-bottom: 5px; font-weight: 500; }
  .issue-note { font-size: 12px; color: var(--text2); line-height: 1.6; }
  .grammar-item { padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .grammar-item:last-child { border-bottom: none; }
  .grammar-title { font-size: 13px; font-weight: 600; color: var(--accent2); margin-bottom: 5px; }
  .grammar-exp { font-size: 12px; color: var(--text2); line-height: 1.65; margin-bottom: 6px; }
  .grammar-ex { font-size: 12px; color: var(--text); background: var(--bg); border-radius: 6px; padding: 6px 10px; font-style: italic; }
  .natural-text { font-size: 14px; color: var(--text); line-height: 1.75; font-style: italic; }
  .save-status { font-size: 12px; text-align: center; padding: 8px 0; }
  .save-ok { color: var(--success); }
  .save-ng { color: var(--danger); }

  #history-page { overflow-y: auto; }
  .history-empty { display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100%; gap: 10px; color: var(--text3); font-size: 14px; padding: 60px 20px; text-align: center; }
  .entry-card {
    margin: 12px 16px; background: var(--surface2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; cursor: pointer; transition: border-color 0.15s;
  }
  .entry-card:active { border-color: var(--accent); }
  .entry-card-date { font-size: 11px; color: var(--text3); margin-bottom: 6px; font-weight: 500; }
  .entry-card-text { font-size: 14px; color: var(--text); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
  .entry-card-badge { display: inline-block; margin-top: 8px; font-size: 11px; padding: 2px 8px; border-radius: 99px; background: rgba(108,99,255,0.15); color: var(--accent2); }

  #settings-page { padding: 20px; overflow-y: auto; gap: 20px; }
  .settings-group { background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .settings-item { padding: 14px 16px; border-bottom: 0.5px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
  .settings-item:last-child { border-bottom: none; }
  .settings-label { font-size: 13px; font-weight: 500; color: var(--text); }
  .settings-desc { font-size: 12px; color: var(--text3); line-height: 1.5; }
  .settings-input {
    width: 100%; background: var(--bg); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 10px 12px; color: var(--text); font-size: 14px;
    font-family: var(--font); outline: none;
  }
  .settings-input:focus { border-color: var(--accent); }
  .save-btn {
    background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
    padding: 13px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%;
  }
  .api-status { font-size: 12px; }
  .api-ok { color: var(--success); }

  #detail-modal {
    display: none; position: fixed; inset: 0; background: var(--bg);
    z-index: 100; flex-direction: column; overflow-y: auto;
  }
  #detail-modal.open { display: flex; }
  .modal-header { padding: 16px 20px; display: flex; align-items: center; gap: 12px;
    border-bottom: 0.5px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 1; }
  .back-btn { background: none; border: none; color: var(--accent2); font-size: 15px; cursor: pointer; padding: 4px 0; }
  .modal-date { font-size: 14px; color: var(--text2); }
  .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; }

  .login-gate { display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 200px; gap: 12px; color: var(--text2); font-size: 14px; text-align: center; padding: 20px; }
</style>
</head>
<body>

<header>
  <h1>📖 英語日記</h1>
  <div id="auth-area">
    <button id="login-btn" onclick="handleLogin()">Googleでログイン</button>
  </div>
</header>

<div class="tab-bar">
  <div class="tab active" onclick="switchTab('write')">書く</div>
  <div class="tab" onclick="switchTab('history')">履歴</div>
  <div class="tab" onclick="switchTab('settings')">設定</div>
</div>

<div class="page active" id="write-page">
  <div class="date-label" id="write-date"></div>
  <div class="prompt-box">
    <div class="label">TODAY'S PROMPT</div>
    <p id="daily-prompt"></p>
  </div>
  <textarea id="diary-input" placeholder="Write in English..."></textarea>
  <div class="char-row">
    <span class="char-count" id="char-count">0 文字</span>
    <button class="submit-btn" id="submit-btn" onclick="submitEntry()" disabled>フィードバックを受ける</button>
  </div>
  <div id="feedback-container"></div>
</div>

<div class="page" id="history-page">
  <div id="history-list"></div>
</div>

<div class="page" id="settings-page">
  <div class="settings-group">
    <div class="settings-item">
      <div class="settings-label">Gemini API キー</div>
      <div class="settings-desc">Google AI Studioで発行したAPIキーを入力してください。</div>
      <input class="settings-input" type="password" id="api-key-input" placeholder="発行されたAPIキー">
      <div class="api-status" id="api-status"></div>
    </div>
  </div>
  <button class="save-btn" onclick="saveSettings()">保存する</button>
  <div class="settings-group" style="margin-top:0">
    <div class="settings-item">
      <div class="settings-label">データの保存先</div>
      <div class="settings-desc">日記はGoogleスプレッドシートに自動保存されます。ログインすると有効になります。</div>
    </div>
    <div class="settings-item">
      <div class="settings-label">ホーム画面に追加</div>
      <div class="settings-desc">Safariで開き、共有ボタン →「ホーム画面に追加」をタップしてください。</div>
    </div>
  </div>
</div>

<div id="detail-modal">
  <div class="modal-header">
    <button class="back-btn" onclick="closeDetail()">← 戻る</button>
    <span class="modal-date" id="modal-date"></span>
  </div>
  <div class="modal-body" id="modal-body"></div>
</div>

<script>
const CLIENT_ID = '116276518816-t820cgclq3rh73lck4m3hhvgtu9pe6dp.apps.googleusercontent.com';
const SHEET_ID = '1foeXJ5YUeJ8viFOMhu8-o7oIdUFSg5K-5oiEoVsBeX4';
const SCOPES = 'https://www.googleapis.com/auth/spreadsheets';

const PROMPTS = [
  "Describe something that made you smile today.",
  "What did you eat today? How did it taste?",
  "Write about someone you talked to today.",
  "What was the most interesting thing you saw today?",
  "Describe your morning routine today.",
  "What are you looking forward to this week?",
  "Write about a challenge you faced recently.",
  "What is something you learned today?",
  "Describe the weather and how it affected your mood.",
  "What would you like to do this weekend?",
  "Write about your workspace or where you spent most of today.",
  "What song or sound stuck in your head today?",
  "Describe a conversation you had today.",
  "What is one thing you want to improve about yourself?",
  "Write about a guest or person you met recently.",
];

let accessToken = null;
let entries = [];
let tokenClient = null;

function init() {
  const d = new Date();
  document.getElementById('write-date').textContent = d.toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric',weekday:'short'});
  document.getElementById('daily-prompt').textContent = PROMPTS[d.getDate() % PROMPTS.length];

  const savedKey = localStorage.getItem('gemini_api_key') || '';
  document.getElementById('api-key-input').value = savedKey;
  if (savedKey) document.getElementById('api-status').innerHTML = '<span class="api-ok">✓ キー設定済み</span>';

  entries = JSON.parse(localStorage.getItem('eng_diary_entries') || '[]');

  document.getElementById('diary-input').addEventListener('input', () => {
    const len = document.getElementById('diary-input').value.length;
    document.getElementById('char-count').textContent = len + ' 文字';
    document.getElementById('submit-btn').disabled = len < 10;
  });

  google.accounts.id.initialize({
    client_id: CLIENT_ID,
    callback: onSignIn,
  });

  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (resp) => {
      if (resp.access_token) {
        accessToken = resp.access_token;
        localStorage.setItem('goog_access_token', accessToken);
        localStorage.setItem('goog_token_expiry', Date.now() + 55 * 60 * 1000);
        updateAuthUI(true);
        ensureSheetHeaders();
        loadFromSheet();
      }
    },
  });

const savedToken = localStorage.getItem('goog_access_token');
  const tokenExpiry = localStorage.getItem('goog_token_expiry');
  if (savedToken && tokenExpiry && Date.now() < parseInt(tokenExpiry)) {
    accessToken = savedToken;
    updateAuthUI(true);
    loadFromSheet();
  } else if (savedToken) {
    tokenClient.requestAccessToken({ prompt: '' });
  }

  renderHistory();
}

function handleLogin() {
  if (accessToken) {
    accessToken = null;
    localStorage.removeItem('goog_access_token');
    updateAuthUI(false);
  } else {
    tokenClient.requestAccessToken();
  }
}

function onSignIn(resp) {}

function updateAuthUI(loggedIn) {
  const btn = document.getElementById('login-btn');
  if (loggedIn) {
    btn.textContent = 'ログアウト';
    btn.className = 'logout';
  } else {
    btn.textContent = 'Googleでログイン';
    btn.className = '';
  }
}

async function ensureSheetHeaders() {
  if (!accessToken) return;
  try {
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/A1:F1`, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const data = await res.json();
    if (!data.values || data.values[0]?.[0] !== '日付') {
      await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/A1:F1?valueInputOption=RAW`, {
        method: 'PUT',
        headers: { Authorization: `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: [['日付', '英文', 'ネイティブ版', '全体コメント', '指摘数', '登録日時']] })
      });
    }
  } catch(e) {}
}

const GAS_URL = 'https://script.google.com/macros/s/AKfycbyJsYBHAaW0kz-HLb2mog0HFQXHqcxJBAES1Bam69kvqvQoCc-NjZi0lqLffJlWJf5T/exec';

async function saveToSheet(entry) {
  try {
    const fb = entry.feedback || {};
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        date: entry.date,
        text: entry.text,
        natural_version: fb.natural_version || '',
        overall_comment_ja: fb.overall_comment_ja || '',
        issues_count: (fb.issues || []).length
      })
    });
    const data = await res.json();
    return data.success === true;
  } catch(e) { return false; }
}

async function loadFromSheet() {
  if (!accessToken) return;
  try {
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/A2:F`, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const data = await res.json();
    if (data.values && data.values.length > 0) {
      const sheetEntries = data.values.map(row => ({
        date: row[0] || '',
        text: row[1] || '',
        feedback: { natural_version: row[2]||'', overall_comment_ja: row[3]||'' }
      })).reverse();
      entries = sheetEntries;
      localStorage.setItem('eng_diary_entries', JSON.stringify(entries));
      renderHistory();
    }
  } catch(e) {}
}

function saveSettings() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) { alert('APIキーを入力してください'); return; }
  localStorage.setItem('gemini_api_key', key);
  document.getElementById('api-status').innerHTML = '<span class="api-ok">✓ 保存しました</span>';
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['write','history','settings'][i] === tab));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(tab + '-page').classList.add('active');
  if (tab === 'history') renderHistory();
}

async function submitEntry() {
  const text = document.getElementById('diary-input').value.trim();
  const apiKey = localStorage.getItem('gemini_api_key');
  if (!apiKey) { alert('設定タブでAPIキーを入力してください'); switchTab('settings'); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = '分析中...';
  document.getElementById('feedback-container').innerHTML = '<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';

  const prompt = `You are an English writing coach for a Japanese learner targeting TOEIC 900+.
Analyze this diary entry and respond ONLY in valid JSON (no markdown, no backticks):
{
  "issues": [{"original": "...", "fixed": "...", "note_ja": "..."}],
  "grammar_points": [{"title_ja": "...", "explanation_ja": "...", "example": "..."}],
  "natural_version": "...",
  "overall_comment_ja": "..."
}
- issues: up to 4 unnatural/incorrect expressions. note_ja in Japanese. Empty array if none.
- grammar_points: exactly 2-3 TOEIC-relevant grammar points. title_ja and explanation_ja in Japanese.
- natural_version: naturally rewritten full version.
- overall_comment_ja: 2-sentence encouraging feedback in Japanese.
Diary entry: "${text.replace(/"/g,'\\"')}"`;

  let fb = null;
  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '{}';
    fb = JSON.parse(raw.replace(/```json|```/g,'').trim());
  } catch(e) {
    document.getElementById('feedback-container').innerHTML = `<div style="color:var(--danger);font-size:13px;padding:12px 0">エラー: ${e.message}</div>`;
    btn.disabled = false; btn.textContent = 'フィードバックを受ける';
    return;
  }

  const dateStr = new Date().toLocaleDateString('ja-JP', {year:'numeric',month:'long',day:'numeric',weekday:'short'});
  const entry = { date: dateStr, text, feedback: fb, ts: Date.now() };
  const existingIdx = entries.findIndex(e => e.date === dateStr);
  if (existingIdx >= 0) entries[existingIdx] = entry; else entries.unshift(entry);
  localStorage.setItem('eng_diary_entries', JSON.stringify(entries));

  showFeedback(fb);
  btn.disabled = false; btn.textContent = 'もう一度フィードバック';

  if (accessToken) {
    const saved = await saveToSheet(entry);
    const statusEl = document.createElement('div');
    statusEl.className = 'save-status ' + (saved ? 'save-ok' : 'save-ng');
    statusEl.textContent = saved ? '✓ スプレッドシートに保存しました' : '⚠ シート保存に失敗（端末には保存済み）';
    document.getElementById('feedback-container').prepend(statusEl);
  }
}

function showFeedback(fb) {
  const issuesHtml = (fb.issues||[]).length > 0
    ? (fb.issues||[]).map(i => `<div class="issue-item"><div class="issue-orig">✗ ${esc(i.original)}</div><div class="issue-fixed">✓ ${esc(i.fixed)}</div><div class="issue-note">${esc(i.note_ja)}</div></div>`).join('')
    : '<div style="font-size:13px;color:var(--success);padding:4px 0">不自然な表現はありませんでした 👍</div>';
  const grammarHtml = (fb.grammar_points||[]).map(g => `
    <div class="grammar-item">
      <div class="grammar-title">📌 ${esc(g.title_ja)}</div>
      <div class="grammar-exp">${esc(g.explanation_ja)}</div>
      <div class="grammar-ex">${esc(g.example)}</div>
    </div>`).join('');
  document.getElementById('feedback-container').innerHTML = `
    <div class="feedback">
      <div class="fb-section">
        <div class="fb-section-header"><span class="fb-icon">💬</span><span class="fb-title">OVERALL COMMENT</span></div>
        <div class="fb-body"><div class="overall-text">${esc(fb.overall_comment_ja||'')}</div></div>
      </div>
      <div class="fb-section">
        <div class="fb-section-header"><span class="fb-icon">🔍</span><span class="fb-title">表現の指摘</span></div>
        <div class="fb-body">${issuesHtml}</div>
      </div>
      ${fb.natural_version ? `
      <div class="fb-section">
        <div class="fb-section-header"><span class="fb-icon">✨</span><span class="fb-title">ネイティブ版</span></div>
        <div class="fb-body"><div class="natural-text">${esc(fb.natural_version)}</div></div>
      </div>` : ''}
      <div class="fb-section">
        <div class="fb-section-header"><span class="fb-icon">📚</span><span class="fb-title">構文解説 (TOEIC視点)</span></div>
        <div class="fb-body">${grammarHtml}</div>
      </div>
    </div>`;
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (entries.length === 0) {
    el.innerHTML = '<div class="history-empty"><div style="font-size:36px">📝</div><div>まだ日記がありません<br>「書く」タブから始めよう</div></div>';
    return;
  }
  el.innerHTML = entries.map((e,i) => `
    <div class="entry-card" onclick="openDetail(${i})">
      <div class="entry-card-date">${esc(e.date)}</div>
      <div class="entry-card-text">${esc(e.text)}</div>
      ${e.feedback ? '<span class="entry-card-badge">✓ フィードバック済み</span>' : ''}
    </div>`).join('');
}

function openDetail(i) {
  const e = entries[i];
  document.getElementById('modal-date').textContent = e.date;
  let html = `<div class="fb-section"><div class="fb-section-header"><span class="fb-icon">✍️</span><span class="fb-title">あなたの英文</span></div><div class="fb-body"><div class="overall-text" style="font-style:italic">${esc(e.text)}</div></div></div>`;
  if (e.feedback && e.feedback.overall_comment_ja) {
    html += `<div class="fb-section"><div class="fb-section-header"><span class="fb-icon">💬</span><span class="fb-title">OVERALL COMMENT</span></div><div class="fb-body"><div class="overall-text">${esc(e.feedback.overall_comment_ja)}</div></div></div>`;
    if (e.feedback.natural_version) html += `<div class="fb-section"><div class="fb-section-header"><span class="fb-icon">✨</span><span class="fb-title">ネイティブ版</span></div><div class="fb-body"><div class="natural-text">${esc(e.feedback.natural_version)}</div></div></div>`;
  }
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('detail-modal').classList.add('open');
}

function closeDetail() { document.getElementById('detail-modal').classList.remove('open'); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
window.onload = init;
</script>
</body>
</html>
